rules:
  # The rule engine is a safety net, not the customer-service brain.
  # Contextual support issues such as payments, refunds, deliveries, and
  # order lookups belong to CustomerServiceAgent so replies stay data-grounded.

  - id: fraud_report
    severity: high
    action: escalate
    description: User reports clear fraud, scam, or marketplace theft.
    response: "I'm sorry this happened. I'm flagging this for support review and will keep the fraud/scam context attached so the team can investigate it with the related order or chat."
    phrases:
      - "seller is scamming me"
      - "seller took my money"
      - "paid outside zunto and got scammed"
      - "never received item but marked delivered"
      - "scam happened on my order"
      - "lost money to seller"
      - "seller used fake tracking"

  - id: threat
    severity: critical
    action: escalate_urgent
    description: Direct threats, intimidation, or violence.
    response: "Your safety comes first. I'm flagging this for urgent review. If you are in immediate danger, leave the situation and contact local emergency help now."
    phrases:
      - "i am going to hurt you"
      - "going to hurt the seller"
      - "going to hurt the buyer"
      - "seller threatened to hurt me"
      - "buyer threatened to hurt me"
      - "physical threat during meetup"
      - "they threatened violence"
      - "you will regret this"

  - id: hate_abuse
    severity: high
    action: escalate
    description: Harassment, hate speech, discrimination, or abusive chat behavior.
    response: "I'm sorry you were treated that way. I'm flagging this for support review and will keep the abusive or discriminatory-message context attached."
    phrases:
      - "seller sent abusive messages"
      - "buyer sent abusive messages"
      - "hate speech in chat"
      - "discriminated against me"
      - "harassment in the chat"
      - "offensive messages from seller"
      - "offensive messages from buyer"

  - id: unauthorized_access
    severity: critical
    action: freeze_account
    description: Account compromise, suspicious login, or user asking to protect the account.
    response: "I understand. I'm flagging this as an account-security issue for immediate review. Please change your password and avoid sharing any verification codes while support checks the account activity."
    phrases:
      - "my account was hacked"
      - "someone accessed my account"
      - "unauthorized activity on my account"
      - "suspicious login on my account"
      - "account compromised by someone"
      - "freeze my account"
      - "lock my account now"

  - id: direct_payment_warning
    severity: medium
    action: warn_unprotected
    description: User reports pressure to pay or receive payment outside Zunto.
    response: "Please keep the transaction inside Zunto. Off-platform payments can remove buyer/seller protection and make disputes harder to verify."
    phrases:
      - "seller asked me to pay outside the app"
      - "seller wants direct payment"
      - "pay seller directly outside zunto"
      - "off platform payment request"
      - "buyer wants to pay cash outside"
      - "move payment away from zunto"

  - id: prohibited_items
    severity: high
    action: enforce_policy
    description: User reports prohibited, illegal, or restricted items on the marketplace.
    response: "Thanks for reporting this. I'm flagging the listing-policy concern so the team can review the item and seller context."
    phrases:
      - "seller is listing prohibited items"
      - "someone is selling illegal items"
      - "seller is selling banned items"
      - "restricted items are being sold"
      - "listing contains illegal product"

  - id: counterfeit_product
    severity: critical
    action: escalate_counterfeit
    description: User reports receiving or discovering counterfeit goods.
    response: "I'm sorry about that. I'm flagging this as a counterfeit-product concern so support can review the order, seller, listing, and any evidence you have."
    phrases:
      - "received a counterfeit product"
      - "seller sent fake product"
      - "item is not authentic"
      - "received a replica instead"
      - "fake item was delivered"
      - "product is counterfeit"

  - id: unsafe_meetup
    severity: critical
    action: escalate_safety
    description: User feels unsafe during a pickup, meetup, or handoff.
    response: "Your safety comes first. Leave the meetup if you can, move to a public place, and contact local emergency help if there is immediate danger. I'm flagging this for urgent support review."
    phrases:
      - "i feel unsafe at meetup"
      - "dangerous situation during meetup"
      - "seller threatened me at meetup"
      - "buyer threatened me at meetup"
      - "uncomfortable meeting the seller"
      - "safety concern during pickup"

  - id: report_user
    severity: high
    action: process_report
    description: Explicit command to report a user, buyer, seller, or account.
    response: "I can help report this. Share the order number, chat, listing, or username involved so support can attach the report to the right record."
    phrases:
      - "report seller"
      - "report buyer"
      - "report user"
      - "report account"
      - "report this seller for fraud"
      - "report this buyer for abuse"

  - id: rule_violation
    severity: high
    action: enforce_policy
    description: User reports clear platform-policy violations.
    response: "Thanks for raising this. I'm flagging the policy concern for review. Please include the listing, chat, order number, or username involved."
    phrases:
      - "seller is breaking platform rules"
      - "buyer violated zunto policy"
      - "user violated marketplace policy"
      - "listing violates zunto rules"
      - "account is breaking rules"
