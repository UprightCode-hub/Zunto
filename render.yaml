services:
  - type: web
    name: zunto-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health/
    buildCommand: cd server && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: cd server && daphne -b 0.0.0.0 -p $PORT ZuntoProject.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: PRODUCTION
        value: "True"
      - key: RENDER_FREE_TIER
        value: "True"
      - key: BACKEND_URL
        value: https://zunto-backend-bdml.onrender.com
      - key: ALLOWED_HOSTS
        value: zunto-backend-bdml.onrender.com,.onrender.com
      - key: FRONTEND_URL
        value: https://zunto-frontend-c48b.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://zunto-frontend-c48b.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://zunto-frontend-c48b.onrender.com
      - key: PRODUCT_VECTOR_BACKEND
        value: auto
      - key: SECRET_KEY
        generateValue: true
      - key: CHAT_HMAC_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zunto-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false

  - type: web
    name: zunto-frontend
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://zunto-backend-bdml.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: zunto-db
    region: oregon
    plan: free
    databaseName: zunto_db
    user: zunto_user
    postgresMajorVersion: "16"
    ipAllowList:
      - source: 0.0.0.0/0
        description: internal-access